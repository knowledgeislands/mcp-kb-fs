name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for npm provenance

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # release-type / package-name etc. live in release-please-config.json
      - uses: googleapis/release-please-action@v5
        id: release

      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.release_created }}

      - uses: oven-sh/setup-bun@v2
        if: ${{ steps.release.outputs.release_created }}
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version-file: '.node-version'
          registry-url: 'https://registry.npmjs.org'

      - run: bun install --frozen-lockfile
        if: ${{ steps.release.outputs.release_created }}

      # `npm publish` is still used (rather than `bun publish`) for the
      # --provenance flag, which produces the sigstore attestation surfaced on
      # the npm registry via the `id-token: write` permission above. The
      # `prepublishOnly` script handles the TypeScript build.
      - run: npm publish --provenance --access public
        if: ${{ steps.release.outputs.release_created }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
